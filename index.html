<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UchidaGakuen</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <header>
        <section class="flex flex-wrap gap-20 justify-between items-center py-6">
        <div>
        <img src="./imags/school-icon.png" alt="アイコン" class="h-40 w-full pl-6">
        </div>
        <div>
        <h1 class="text-6xl md:mr-40">内田学園高等学校</h1>
        </div>
        </section>
        <section class="flex bg-red-700 text-white font-bold py-4 justify-between items-center">
            <div class="mx-auto flex flex-wrap">
                <div class="hover:text-black flex flex-col mx-20">
                    <a href="#target-section1" class="text-2xl pl-4">校内案内</a>
                    <a href="#target-section1" class="">school information</a>
                </div>
                <div class="hover:text-black flex flex-col mx-20">
                    <a href="#target-section2" class="text-2xl">行事</a>
                    <a href="#target-section2" class="pl-1">event</a>
                </div>
                <div class="hover:text-black flex flex-col mx-20">
                    <a href="#target-section3" class="text-2xl pl-6">進路</a>
                    <a href="#target-section3" class="px-auto">career guidance</a>
                </div>
                <div class="hover:text-black pr-6 flex flex-col mx-20">
                    <a href="#target-section4" class="text-2xl pl-3">入試</a>
                    <a href="#target-section4" class="px-auto">admissions</a>
                </div>
            </div>
        </section>
    </header>
<main>
    <img src="./imags/school-bill.jpg" alt="校舎" class="h-200 w-full">
<div class="justify-center flex" id="target-section1">
    <h1 class="py-40 text-3xl">校内案内</h1>
</div>
<img src="./imags/school-map.jpg" alt="校内案内" class="h-48 w-full">
<div class="justify-center flex" id="target-section2">
    <h1 class="mx-auto text-3xl py-40">行事</h1>
</div>
<div class="grid grid-cols-1 sm:grid-cols-3 md:grid-cols-3 gap-4">
        <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg hover:scale-105 transition">
            <div class="justify-center items-center flex">
        <h1 class="text-4xl mx-auto py-6">文化祭</h1>
            </div>
        <img src="./imags/school-bunkasai.jpg" alt="文化祭" class="h-80 w-full">
        </div>


        <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg hover:scale-105 transition">
            <div class="justify-center items-center flex">
        <h1 class="text-4xl mx-auto py-6">修学旅行</h1>
            </div>
        <img src="./imags/S__69132296.jpg" alt="修学旅行" class="h-80 w-full">
        </div>


        <div class="bg-white rounded-lg shadow p-4 hover:shadow-lg hover:scale-105 transition">
            <div class="justify-center items-center flex">
        <h1 class="text-4xl mx-auto py-6">球技大会</h1>
            </div>
        <img src="./imags/school-kyuugi.jpg" alt="球技大会" class="h-80 w-full">
        </div>
    </div>
    <div class="justify-center items-center flex my-40">
    <h1 class="text-3xl" id="target-section3">進路</h1>
    </div>
    <div class="flex flex-wrap items-center justify-center gap-6">
    <h2 class="text-6xl font-bold">東大</h2>
    <h3 class="text-6xl text-red-500">159名</h3>
    </div>
    <div class="justify-center items-center flex pt-80 pb-20">
        <h2 class="text-3xl " id="target-section4">入試</h2>
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-2 gap-4">
        <div class="bg-orange-50 rounded-lg shadow p-4 hover:shadow-lg hover:scale-105 transition">
            <div class="justify-center items-center flex">
        <h1 class="text-4xl mx-auto py-6 text-red-800 font-bold">文系入試</h1>
            </div>
        <div class="justify-center items-center flex flex-col text-orange-900 font-bold">
        <h2 class="text-2xl mx-auto">国語（５０分）
        <h2 class="text-2xl mx-auto">小論文（４０分）
        <h2 class="text-2xl mx-auto">社会（４０分）
        <h2 class="text-2xl mx-auto">英語（５０分）
        <h2 class="text-2xl mx-auto">数学・理科（４０分）
        </div>
        </div>

        <div class="bg-orange-900 rounded-lg shadow p-4 hover:shadow-lg hover:scale-105 transition">
            <div class="justify-center items-center flex">
        <h1 class="text-4xl mx-auto py-6 text-white font-bold">理系入試</h1>
            </div>
        <div class="justify-center items-center flex flex-col text-white">
        <h2 class="text-2xl mx-auto">数学（５０分）
        <h2 class="text-2xl mx-auto">理科（５０分）
        <h2 class="text-2xl mx-auto">小論文（４０分）
        <h2 class="text-2xl mx-auto">英語（５０分）
        </div>
        </div>
    </div>
    <footer>
        <div class="justify-center items-center flex bg-gray-600 mt-40 py-12">
        <h4 class="text-white text-2xl">🄫2026uchidagakuen</h4>
        </div>
    </footer>
</main>
</body>
</html>
